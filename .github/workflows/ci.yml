name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Must match the DuckDB version bundled by the `duckdb` crate in Cargo.toml
  # (crate ~1.10504.0 encodes libduckdb 1.5.4).
  DUCKDB_CLI_VERSION: "1.5.4"
  DUCKDB_CLI_SHA256: "1f2fa724fb054b3dbe1a9cbd13de5b76997d850e7087ec762ba88db04e0180cf"

jobs:
  lint:
    name: Format and Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run Clippy on every target
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  audit:
    name: Dependency advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ruuvi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ruuvi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      RUUVI_TEST_POSTGRES_URL: host=127.0.0.1 port=5432 dbname=ruuvi_test user=postgres password=postgres
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run complete test suite
        run: cargo test --locked --all-targets --all-features

  build:
    name: Release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build release binary
        run: cargo build --locked --release --all-features
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ruuvi-data-forwarder-rs
          path: |
            target/release/ruuvi-data-forwarder-rs
            target/release/ruuvi-ducklake-maintenance-rs
          retention-days: 7

  integration-tests:
    name: Binary integration tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ruuvi-data-forwarder-rs
          path: target/release
      - name: Restore executable permissions
        run: chmod +x target/release/ruuvi-data-forwarder-rs target/release/ruuvi-ducklake-maintenance-rs
      - name: Install matching DuckDB CLI
        run: |
          wget -q "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_CLI_VERSION}/duckdb_cli-linux-amd64.zip"
          echo "${DUCKDB_CLI_SHA256}  duckdb_cli-linux-amd64.zip" | sha256sum --check
          unzip duckdb_cli-linux-amd64.zip
          sudo mv duckdb /usr/local/bin/
          duckdb --version
      - name: Exercise console, DuckDB, and DuckLake binaries
        run: make test-sinks
